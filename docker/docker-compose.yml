services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://platform:platform@postgres:5432/platform
      SYNC_DATABASE_URL: postgresql://platform:platform@postgres:5432/platform
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JUDGER_INTERNAL_TOKEN: ${JUDGER_INTERNAL_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  judger:
    build:
      context: ../judger
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_INTERNAL_URL: http://backend:8000/api/submissions/internal
      JUDGER_INTERNAL_TOKEN: ${JUDGER_INTERNAL_TOKEN}
      SANDBOX_IMAGE_PYTHON: platform-sandbox-python:latest
      SANDBOX_IMAGE_SQL: platform-sandbox-sql:latest
      SANDBOX_IMAGE_CPP: platform-sandbox-cpp:latest
      SANDBOX_IMAGE_JS: platform-sandbox-js:latest
      SANDBOX_TIMEOUT: "30"
      SANDBOX_MEMORY_LIMIT: "256m"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  e2e-check:
    build:
      context: ../infrastructure/e2e
      dockerfile: Dockerfile
    profiles: ["e2e"]
    environment:
      BASE_URL: http://backend:8000
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      E2E_TIMEOUT: "120"
      E2E_HEALTH_TIMEOUT: "120"
    depends_on:
      backend:
        condition: service_started
      judger:
        condition: service_started

  # --- Monitoring ---

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://platform:platform@postgres:5432/platform?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafanadata:
