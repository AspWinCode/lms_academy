services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 80M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://platform:${POSTGRES_PASSWORD}@postgres:5432/platform
      SYNC_DATABASE_URL: postgresql://platform:${POSTGRES_PASSWORD}@postgres:5432/platform
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JUDGER_INTERNAL_TOKEN: ${JUDGER_INTERNAL_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SKIP_ALEMBIC: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  judger:
    build:
      context: ./judger
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_INTERNAL_URL: http://backend:8000/api/submissions/internal
      JUDGER_INTERNAL_TOKEN: ${JUDGER_INTERNAL_TOKEN}
      SANDBOX_IMAGE_PYTHON: platform-sandbox-python:latest
      SANDBOX_IMAGE_SQL: platform-sandbox-sql:latest
      SANDBOX_IMAGE_CPP: platform-sandbox-cpp:latest
      SANDBOX_IMAGE_JS: platform-sandbox-js:latest
      SANDBOX_TIMEOUT: "15"
      SANDBOX_MEMORY_LIMIT: "128m"
      SANDBOX_MAX_CONCURRENT: "2"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M

  e2e-check:
    build:
      context: ./infrastructure/e2e
      dockerfile: Dockerfile
    profiles: ["e2e"]
    environment:
      BASE_URL: http://backend:8000
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      E2E_TIMEOUT: "120"
      E2E_HEALTH_TIMEOUT: "120"
    depends_on:
      backend:
        condition: service_started
      judger:
        condition: service_started

volumes:
  pgdata:
